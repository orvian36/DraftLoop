[project]
name = "draftloop-eval"
version = "0.1.0"
description = "DraftLoop evaluation harness (rubric scorecard + suite drivers)"
requires-python = ">=3.12,<3.13"
dependencies = [
    "draftloop-core",
    "draftloop-ingest",
    "draftloop-retrieval",
    "draftloop-drafting",
    "draftloop-edits",
]

# Optional: ragas (Ragas faithfulness/context_precision metrics), vcrpy (CostBudgetSuite),
# plotly + jinja2 (richer HTML reports). The harness ships with built-in lightweight
# metrics and a plain-HTML report, so these are upgrade paths, not requirements.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/draftloop_eval"]
