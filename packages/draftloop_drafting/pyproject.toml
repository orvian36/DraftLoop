[project]
name = "draftloop-drafting"
version = "0.1.0"
description = "DraftLoop grounded drafting + verification"
requires-python = ">=3.12,<3.13"
dependencies = [
    "draftloop-core",
    "draftloop-retrieval",
]

# Optional: HHEM-2.1-Open NLI faithfulness scoring requires transformers + torch
# (~1.5GB). Install separately via: pip install transformers torch sentencepiece
# If unavailable, the Verifier falls back to substring + Flash-judge only.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/draftloop_drafting"]
